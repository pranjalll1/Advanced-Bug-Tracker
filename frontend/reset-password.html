<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BugTrackr — Reset Password</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="auth-split-page">

    <div class="auth-split-layout">
        
        <!-- Left Side: Image & Branding -->
        <div class="auth-split-left">
            <div class="auth-split-left-content fade-in-up">
                <h1>Reset Password</h1>
                <p>Create a strong, secure password for your BugTrackr account.</p>
            </div>
        </div>

        <!-- Right Side: Form & Navbar -->
        <div class="auth-split-right">
            
            <!-- Back to Home Navbar -->
            <nav class="auth-navbar">
                <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            </nav>

            <!-- Reset Password Form Container -->
            <div class="auth-split-form-container fade-in-up delay-1">
        <div class="auth-header">
            <div class="auth-logo"><i class="fa-solid fa-key"></i></div>
            <h1>Reset Password</h1>
            <p>Please enter your new secure password</p>
        </div>

        <div class="alert alert-success" id="successMsg" style="display:none;">
            <i class="fa-solid fa-check-circle"></i>
            <span></span>
        </div>

        <div class="alert alert-error" id="errorMsg" style="display:none;">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span></span>
        </div>

        <form id="resetPasswordForm" novalidate>
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-lock icon"></i>
                    <input type="password" id="password" placeholder="New password" required />
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-lock icon"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required />
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="resetBtn">
                Update Password
            </button>
        </form>

        <div class="auth-footer">
            Back to <a href="login.html">Sign In</a>
        </div>
        </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
  <script src="js/ConfirmModal.js"></script>
</body>

</html>
