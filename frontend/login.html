<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BugTrackr — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- 1. Added FontAwesome for modern icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="auth-split-page">

  <div class="auth-split-layout">
    
    <!-- Left Side: Image & Branding -->
    <div class="auth-split-left">
      <div class="auth-split-left-content fade-in-up">
        <h1>Welcome Back</h1>
        <p>Log in to your BugTrackr workspace to continue managing your projects and issues.</p>
      </div>
    </div>

    <!-- Right Side: Form & Navbar -->
    <div class="auth-split-right">
      
      <!-- Back to Home Navbar -->
      <nav class="auth-navbar">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
      </nav>

      <!-- Login Form Container -->
      <div class="auth-split-form-container fade-in-up delay-1">

    <!-- Logo / Title -->
    <div class="auth-header">
      <div class="auth-logo"><i class="fa-solid fa-bug"></i></div>
      <h1>Welcome Back</h1>
      <p>Sign in to your BugTrackr workspace</p>
    </div>

    <!-- Error Message Box -->
    <div class="alert alert-error" id="errorMsg" style="display:none;">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="errorText"></span>
    </div>

    <!-- Login Form -->
    <form id="loginForm" novalidate>

      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-icon-wrapper">
          <i class="fa-regular fa-envelope icon"></i>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <!-- 2. Added a flex container to put Label and Forgot Password link on the same line -->
        <div class="label-row">
          <label for="password">Password</label>
          <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
        </div>
        <div class="input-icon-wrapper">
          <i class="fa-solid fa-lock icon"></i>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
        Sign In <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
      </button>

    </form>

    <!-- Footer Link -->
    <div class="auth-footer">
      Don't have an account?
      <a href="register.html">Create one</a>
    </div>

      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/ConfirmModal.js"></script>
</body>

</html>
