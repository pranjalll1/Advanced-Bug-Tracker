<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasks | Bug Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="app-page">

  <!-- Sidebar Layout -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <i class="fa-solid fa-bug"></i> BugTrackr
    </div>
    
    <div class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <i class="fa-solid fa-chart-pie nav-icon"></i> Dashboard
      </a>
      <a href="bugs.html" class="nav-item">
        <i class="fa-solid fa-spider nav-icon"></i> Bugs
      </a>
      <a href="tasks.html" class="nav-item active">
        <i class="fa-solid fa-list-check nav-icon"></i> Tasks
      </a>
      <!-- Admin link shown only if user is admin -->
      <a href="admin.html" class="nav-item" id="admin-link" style="display:none;">
        <i class="fa-solid fa-crown nav-icon"></i> Admin Panel
      </a>
      <a href="settings.html" class="nav-item">
        <i class="fa-solid fa-gear nav-icon"></i> Settings
      </a>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="user-name">User Name</div>
        <div class="user-role" id="user-role-badge">Role</div>
      </div>
      <button onclick="logout()" class="logout-btn" title="Logout">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-title">
        <h2>Task Management</h2>
        <p>Keep track of what needs to be done.</p>
      </div>
      <div class="topbar-actions">
        <!-- Dark Mode Toggle Button -->
        <button id="theme-toggle" class="btn-icon" title="Toggle Dark Mode">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </header>
  <div class="container">

    <!-- Page Header -->
    <div class="page-header">
      <h1><i class="fa-solid fa-list-check"></i> Task List</h1>
      <button onclick="openCreateModal()" id="create-task-btn"
        class="btn-primary">
        + Create Task
      </button>
    </div>

    <!-- ─── Filters ─────────────────────────────────────── -->
    <div class="filters">
      <select id="filter-status" onchange="applyFilters()">
        <option value="">All Status</option>
        <option value="todo">Todo</option>
        <option value="in-progress">In Progress</option>
        <option value="in-review">In Review</option>
        <option value="done">Done</option>
        <option value="cancelled">Cancelled</option>
      </select>

      <select id="filter-priority" onchange="applyFilters()">
        <option value="">All Priority</option>
        <option value="urgent">Urgent</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>

      <input
        type="text"
        id="filter-search"
        placeholder="🔍 Search tasks..."
        oninput="applyFilters()"
      />
    </div>

    <!-- ─── Task Table ───────────────────────────────────── -->
    <div class="table-wrapper">
      <table class="bug-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Progress</th>
            <th>Assigned To</th>
            <th>Created By</th>
            <th>Due Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="task-table-body">
          <tr>
            <td colspan="8" class="loading-text">
              Loading tasks...
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination">
      <button id="prev-btn" onclick="changePage(-1)" disabled>
        ← Prev
      </button>
      <span id="page-info">Page 1</span>
      <button id="next-btn" onclick="changePage(1)">
        Next →
      </button>
    </div>

  </div>

  <!-- ─── Create Task Modal ────────────────────────────────── -->
  <div id="create-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📋 Create New Task</h2>
        <span onclick="closeCreateModal()" class="close-btn">✕</span>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="task-title"
            placeholder="Short task title" />
        </div>

        <div class="form-group">
          <label>Description *</label>
          <textarea id="task-description" rows="3"
            placeholder="What needs to be done..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Priority</label>
            <select id="task-priority">
              <option value="medium">Medium</option>
              <option value="urgent">Urgent</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>

          <div class="form-group">
            <label>Due Date</label>
            <input type="date" id="task-due-date" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Project</label>
            <input type="text" id="task-project"
              placeholder="e.g. Web App v2" />
          </div>

          <div class="form-group">
            <label>Estimated Hours</label>
            <input type="number" id="task-hours"
              placeholder="e.g. 8" min="0" />
          </div>
        </div>

        <div id="create-error" class="error-msg hidden"></div>
      </div>

      <div class="modal-footer">
        <button onclick="closeCreateModal()"
          class="btn-secondary">Cancel</button>
        <button onclick="createTask()"
          class="btn-primary">Create Task</button>
      </div>
    </div>
  </div>

  <!-- ─── Update Status Modal ──────────────────────────────── -->
  <!-- ─── Update Status Modal ──────────────────────────────── -->
<div id="status-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2>🔄 Update Task</h2>
      <span onclick="closeStatusModal()" class="close-btn">✕</span>
    </div>

    <div class="modal-body">

      <!-- Status -->
      <div class="form-group">
        <label>Status</label>
        <select id="new-status">
          <option value="todo">Todo</option>
          <option value="in-progress">In Progress</option>
          <option value="in-review">In Review</option>
          <option value="done">Done</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <!-- Progress -->
      <div class="form-group">
        <label>Progress % (0–100)</label>
        <input
          type="number"
          id="new-progress"
          min="0"
          max="100"
          placeholder="e.g. 50"
        />
      </div>

      <!-- Assign to Developer (admin and manager only) -->
      <div class="form-group" id="assign-task-section">
        <label>Assign To</label>
        <select id="assign-task-user">
          <option value="">Loading users...</option>
        </select>
      </div>

      <div id="status-error" class="error-msg hidden"></div>
    </div>

    <div class="modal-footer">
      <button onclick="closeStatusModal()"
        class="btn-secondary">Cancel</button>
      <button onclick="submitStatusUpdate()"
        class="btn-primary">Update Task</button>
    </div>
  </div>
</div>

   

  <!-- Overlay -->
  <div id="modal-overlay" class="overlay hidden"
    onclick="closeAllModals()"></div>

  <script src="js/tasks.js"></script>
  <script>
    // Dark Mode Logic
    const themeToggleBtn = document.getElementById('theme-toggle');
    const icon = themeToggleBtn.querySelector('i');

    // Check local storage for saved theme
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
      icon.classList.replace('fa-moon', 'fa-sun');
    }

    themeToggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');

      if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('theme', 'dark');
        icon.classList.replace('fa-moon', 'fa-sun');
      } else {
        localStorage.setItem('theme', 'light');
        icon.classList.replace('fa-sun', 'fa-moon');
      }
    });
  </script>
    <script src="js/avatar.js"></script>
</main>

  

  <script src="js/ConfirmModal.js"></script>
</body>
</html>
