<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BugTrackr — Forgot Password</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="auth-split-page">

    <div class="auth-split-layout">
        
        <!-- Left Side: Image & Branding -->
        <div class="auth-split-left">
            <div class="auth-split-left-content fade-in-up">
                <h1>Reset Password</h1>
                <p>Don't worry, we'll help you get back into your BugTrackr workspace.</p>
            </div>
        </div>

        <!-- Right Side: Form & Navbar -->
        <div class="auth-split-right">
            
            <!-- Back to Home Navbar -->
            <nav class="auth-navbar">
                <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            </nav>

            <!-- Forgot Password Form Container -->
            <div class="auth-split-form-container fade-in-up delay-1">
        <div class="auth-header">
            <div class="auth-logo"><i class="fa-solid fa-unlock-keyhole"></i></div>
            <h1>Forgot Password</h1>
            <p>Enter your email to receive a reset link</p>
        </div>

        <!-- Success Message Box -->
        <div class="alert alert-success" id="successMsg" style="display:none;">
            <i class="fa-solid fa-check-circle"></i>
            <span></span>
        </div>

        <!-- Error Message Box -->
        <div class="alert alert-error" id="errorMsg" style="display:none;">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span></span>
        </div>

        <!-- Forgot Password Form -->
        <form id="forgotPasswordForm" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-icon-wrapper">
                    <i class="fa-regular fa-envelope icon"></i>
                    <input type="email" id="email" placeholder="you@example.com" required />
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="forgotBtn">
                Send Reset Link
            </button>
        </form>

        <div class="auth-footer">
            Remembered your password? <a href="login.html">Sign In</a>
        </div>
        </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
  <script src="js/ConfirmModal.js"></script>
</body>

</html>
