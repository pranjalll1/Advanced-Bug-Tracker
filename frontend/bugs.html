<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bugs | Bug Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="app-page">

  <!-- Sidebar Layout -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <i class="fa-solid fa-bug"></i> BugTrackr
    </div>
    
    <div class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <i class="fa-solid fa-chart-pie nav-icon"></i> Dashboard
      </a>
      <a href="bugs.html" class="nav-item active">
        <i class="fa-solid fa-spider nav-icon"></i> Bugs
      </a>
      <a href="tasks.html" class="nav-item">
        <i class="fa-solid fa-list-check nav-icon"></i> Tasks
      </a>
      <!-- Admin link shown only if user is admin -->
      <a href="admin.html" class="nav-item" id="admin-link" style="display:none;">
        <i class="fa-solid fa-crown nav-icon"></i> Admin Panel
      </a>
      <a href="settings.html" class="nav-item">
        <i class="fa-solid fa-gear nav-icon"></i> Settings
      </a>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="user-name">User Name</div>
        <div class="user-role" id="user-role-badge">Role</div>
      </div>
      <button onclick="logout()" class="logout-btn" title="Logout">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-title">
        <h2>Bug Tracking</h2>
        <p>Manage and resolve issues.</p>
      </div>
      <div class="topbar-actions">
        <!-- Dark Mode Toggle Button -->
        <button id="theme-toggle" class="btn-icon" title="Toggle Dark Mode">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </header>
  <div class="container">

    <!-- Page Header -->
    <div class="page-header">
      <h1><i class="fa-solid fa-bug"></i> Bug List</h1>
      <button id="report-bug-btn" onclick="openCreateModal()" class="btn-primary">
        + Report Bug
      </button>
    </div>

    <!-- ─── Filters ─────────────────────────────────────── -->
    <div class="filters">
      <select id="filter-status" onchange="applyFilters()">
        <option value="">All Status</option>
        <option value="open">Open</option>
        <option value="in-progress">In Progress</option>
        <option value="resolved">Resolved</option>
        <option value="closed">Closed</option>
        <option value="reopened">Reopened</option>
      </select>

      <select id="filter-severity" onchange="applyFilters()">
        <option value="">All Severity</option>
        <option value="critical">Critical</option>
        <option value="major">Major</option>
        <option value="minor">Minor</option>
        <option value="trivial">Trivial</option>
      </select>

      <select id="filter-priority" onchange="applyFilters()">
        <option value="">All Priority</option>
        <option value="urgent">Urgent</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>

      <input
        type="text"
        id="filter-search"
        placeholder="🔍 Search bugs..."
        oninput="applyFilters()"
      />
    </div>

    <!-- ─── Bug Table ────────────────────────────────────── -->
    <div class="table-wrapper">
      <table class="bug-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Severity</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Assigned To</th>
            <th>Reported By</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="bug-table-body">
          <!-- Bugs injected here by JS -->
          <tr>
            <td colspan="8" class="loading-text">Loading bugs...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination">
      <button id="prev-btn" onclick="changePage(-1)" disabled>← Prev</button>
      <span id="page-info">Page 1</span>
      <button id="next-btn" onclick="changePage(1)">Next →</button>
    </div>

  </div>

  <!-- ─── Create Bug Modal ─────────────────────────────────── -->
  <div id="create-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>🐛 Report New Bug</h2>
        <span onclick="closeCreateModal()" class="close-btn">✕</span>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="bug-title" placeholder="Short description of the bug" />
        </div>

        <div class="form-group">
          <label>Description *</label>
          <textarea id="bug-description" rows="3"
            placeholder="Detailed description..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Severity</label>
            <select id="bug-severity">
              <option value="minor">Minor</option>
              <option value="major">Major</option>
              <option value="critical">Critical</option>
              <option value="trivial">Trivial</option>
            </select>
          </div>

          <div class="form-group">
            <label>Priority</label>
            <select id="bug-priority">
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
              <option value="low">Low</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Project</label>
          <input type="text" id="bug-project" placeholder="e.g. Web App v2" />
        </div>

        <div class="form-group">
          <label>Steps to Reproduce</label>
          <textarea id="bug-steps" rows="2"
            placeholder="1. Go to... 2. Click..."></textarea>
        </div>

        <div id="create-error" class="error-msg hidden"></div>
      </div>

      <div class="modal-footer">
        <button onclick="closeCreateModal()" class="btn-secondary">Cancel</button>
        <button onclick="createBug()" class="btn-primary">Submit Bug</button>
      </div>
    </div>
  </div>

  <!-- Overlay -->
  <div id="modal-overlay" class="overlay hidden"
    onclick="closeCreateModal()"></div>

  <script src="js/bugs.js"></script>
  <script>
    // Dark Mode Logic
    const themeToggleBtn = document.getElementById('theme-toggle');
    const icon = themeToggleBtn.querySelector('i');

    // Check local storage for saved theme
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
      icon.classList.replace('fa-moon', 'fa-sun');
    }

    themeToggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');

      if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('theme', 'dark');
        icon.classList.replace('fa-moon', 'fa-sun');
      } else {
        localStorage.setItem('theme', 'light');
        icon.classList.replace('fa-sun', 'fa-moon');
      }
    });
  </script>
    <script src="js/avatar.js"></script>
</main>

  

  <script src="js/ConfirmModal.js"></script>
</body>
</html>
